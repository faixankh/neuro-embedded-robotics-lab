<line x1="610" y1="200" x2="670" y2="200" stroke="black" stroke-width="2"/>
<line x1="910" y1="200" x2="970" y2="200" stroke="black" stroke-width="2"/>
<line x1="190" y1="260" x2="220" y2="360" stroke="black" stroke-width="2"/>
<line x1="490" y1="260" x2="520" y2="360" stroke="black" stroke-width="2"/>
<line x1="790" y1="260" x2="820" y2="360" stroke="black" stroke-width="2"/>
<line x1="1080" y1="260" x2="1110" y2="360" stroke="black" stroke-width="2"/>
<line x1="320" y1="480" x2="400" y2="590" stroke="black" stroke-width="2"/>
<line x1="860" y1="480" x2="870" y2="590" stroke="black" stroke-width="2"/>
