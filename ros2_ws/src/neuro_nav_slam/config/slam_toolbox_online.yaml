slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping
    base_frame: base_link
    map_frame: map
    odom_frame: odom
    scan_topic: /scan
    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.12
    resolution: 0.05
    max_laser_range: 12.0
    transform_publish_period: 0.05
    map_update_interval: 2.0