name: ci
on:
  push:
  pull_request:
jobs:
  python-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip pytest numpy matplotlib
      - run: python scripts/validate_ros2_layout.py
      - run: pytest -q
